<!DOCTYPE html>
<html>
<head>
    <title>Search Flights - SkyLink</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: #1a2a6c; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        .search-box { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            width: 800px; 
        }
        h2 { 
            color: #1a2a6c; 
            text-align: center; 
            margin-bottom: 30px; 
            font-size: 28px; 
        }
        .form-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 20px; 
            align-items: end; 
        }
        .input-group { 
            display: flex; 
            flex-direction: column; 
        }
        label { 
            font-weight: 600; 
            font-size: 14px; 
            color: #555; 
            margin-bottom: 8px; 
        }
        select, input[type="date"] { 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 15px; 
            outline: none; 
            box-sizing: border-box; 
        }
        .btn-search { 
            background: #f39c12; 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            width: 100%;
            margin-top: 25px; 
        }
        .btn-search:hover { 
            background: #e67e22; 
        }
        .back-link { 
            display: block; 
            text-align: center; 
            margin-top: 20px; 
            text-decoration: none; 
            color: #1a2a6c; 
            font-weight: bold; 
        }
    </style>
</head>
<body>
    <div class="search-box">
        <h2>Find Your Next Flight ✈️</h2>
        
        <form action="/search" method="POST">
            <div class="form-grid">
                <!-- From / Source -->
                <div class="input-group">
                    <label>From (Source)</label>
                    <select name="source" required>
                        <option value="" disabled selected>Select Departure</option>
                        <!-- app.py থেকে আসা জায়গার লিস্ট -->
                        {% for place in places %}
                        <option value="{{ place }}">{{ place }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <!-- To / Destination -->
                <div class="input-group">
                    <label>To (Destination)</label>
                    <select name="destination" required>
                        <option value="" disabled selected>Select Arrival</option>
                        <!-- app.py থেকে আসা জায়গার লিস্ট -->
                        {% for place in places %}
                        <option value="{{ place }}">{{ place }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Travel Date -->
                <div class="input-group">
                    <label>Travel Date</label>
                    <input type="date" name="travel_date" required>
                </div>
            </div>
            
            <button type="submit" class="btn-search">Search Flights</button>
        </form>
        
        <a href="/" class="back-link">← Back to Home</a>
    </div>
</body>
</html>
