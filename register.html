<!DOCTYPE html>
<html>
<head>
    <title>Register - SkyLink</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .reg-card { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            width: 350px; 
            text-align: center; 
        }
        h2 { color: #1a2a6c; margin-bottom: 10px; font-weight: 700; }
        p.sub-text { color: #777; font-size: 14px; margin-bottom: 25px; }
        
        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: #2ecc71; box-shadow: 0 0 8px rgba(46, 204, 113, 0.2); }
        
        button { 
            width: 100%; 
            padding: 14px; 
            background: #2ecc71; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer; 
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover { 
            background: #27ae60; 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
        }
        
        .login-link { 
            margin-top: 25px; 
            font-size: 14px; 
            color: #555; 
        }
        .login-link a { 
            color: #1a2a6c; 
            text-decoration: none; 
            font-weight: bold; 
            transition: 0.2s;
        }
        .login-link a:hover { color: #f39c12; }
    </style>
</head>
<body>
    <div class="reg-card">
        <h2>Join SkyLink</h2>
        <p class="sub-text">Create your account to start booking</p>
        
        <form action="/register" method="POST">
            <input type="email" name="email" placeholder="Enter Email Address" required>
            <input type="password" name="password" placeholder="Create Strong Password" required>
            <button type="submit">Register Account</button>
        </form>
        
        <div class="login-link">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>
</body>
</html>
