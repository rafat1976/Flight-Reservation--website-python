<!DOCTYPE html>
<html>
<head>
    <title>Login - SkyLink</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }
        h2 { color: #1a2a6c; margin-bottom: 25px; }
        
        .alert {
            background-color: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            border: 1px solid #f5c6cb;
        }

        /* Input style for both email and text */
        #emailInput, input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
        }
        #emailInput:focus, input[type="password"]:focus { border-color: #1a2a6c; }
        
        .role-selection {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            font-weight: 600;
            color: #555;
        }
        .role-selection label { cursor: pointer; }
        
        button {
            background: #1a2a6c;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #f39c12; transform: translateY(-2px); }
        
        .register-link { margin-top: 20px; font-size: 14px; color: #777; }
        .register-link a { color: #1a2a6c; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Welcome Back</h2>

        <!-- ফ্ল্যাশ মেসেজ এরিয়া -->
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <!-- ID যোগ করা হয়েছে যাতে JavaScript এটাকে ধরতে পারে -->
            <input type="email" id="emailInput" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>
            
            <div class="role-selection">
                <!-- Onclick ইভেন্ট যোগ করা হয়েছে টাইপ চেঞ্জ করার জন্য -->
                <label><input type="radio" name="role" value="User" onclick="toggleInput('User')" checked> User</label>
                <label><input type="radio" name="role" value="Admin" onclick="toggleInput('Admin')"> Admin</label>
            </div>

            <button type="submit">Login to SkyLink</button>
        </form>

        <div class="register-link">
            Don't have an account? <a href="/register">Register Now</a>
        </div>
    </div>

    <script>
        function toggleInput(role) {
            const emailInput = document.getElementById('emailInput');
            if (role === 'Admin') {
                // অ্যাডমিন সিলেক্ট করলে টাইপ টেক্সট হবে যাতে @ না লাগে
                emailInput.type = 'text';
                emailInput.placeholder = 'Admin Username';
            } else {
                // ইউজার সিলেক্ট করলে টাইপ আবার ইমেইল হয়ে যাবে
                emailInput.type = 'email';
                emailInput.placeholder = 'Email Address';
            }
        }
    </script>

</body>
</html>
