<!DOCTYPE html>
<html>
<head>
    <title>Passenger Details - SkyLink</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; margin: 0; padding: 40px; }
        .form-container { max-width: 750px; margin: 0 auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #1a2a6c; text-align: center; margin-bottom: 5px; }
        .flight-info { text-align: center; color: #f39c12; font-weight: bold; margin-bottom: 30px; font-size: 18px;}
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: 1 / -1; }
        label { font-weight: 600; font-size: 14px; color: #555; display: block; margin-bottom: 8px; }
        input[type="text"], input[type="email"], input[type="date"], select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        /* Seat Map CSS */
        .seat-selection { background: #f8f9fa; padding: 25px; border-radius: 12px; margin-top: 30px; text-align: center; border: 2px dashed #bdc3c7; }
        .seat-selection h3 { color: #2c3e50; margin-top: 0; margin-bottom: 20px; }
        .plane-body { display: inline-block; background: white; padding: 20px 40px; border-radius: 50px 50px 15px 15px; border: 3px solid #e0e0e0; box-shadow: 0 5px 15px rgba(0,0,0,0.05); min-width: 300px;}
        .seat-row { display: flex; justify-content: center; gap: 12px; margin-bottom: 15px; }
        .aisle { width: 40px; }
        .seat-input { display: none; }
        
        /* Seat Base Design */
        .seat-label { width: 45px; height: 45px; border-radius: 8px 8px 4px 4px; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        /* Business Class Colors */
        .seat-label.business { background: #f1c40f; border-bottom: 4px solid #f39c12; color: #2c3e50; }
        .seat-label.business:hover { background: #f39c12; color: white; }
        
        /* Economy Class Colors */
        .seat-label.economy { background: #95a5a6; border-bottom: 4px solid #7f8c8d; }
        .seat-label.economy:hover { background: #7f8c8d; }
        
        /* State Colors */
        .seat-input:checked + .seat-label { background: #2ecc71 !important; border-bottom: 4px solid #27ae60 !important; box-shadow: 0 0 10px rgba(46, 204, 113, 0.4); color: white !important;}
        .seat-input:disabled + .seat-label { background: #e74c3c !important; border-bottom: 4px solid #c0392b !important; cursor: not-allowed; opacity: 0.6; color: #ffd1d1 !important; }
        
        .legend { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; font-size: 13px; font-weight: 600; color: #555;}
        .leg-box { width: 18px; height: 18px; border-radius: 4px; display: inline-block; vertical-align: middle; margin-right: 5px;}
        
        .btn-submit { background: #1a2a6c; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 30px; transition: 0.3s;}
        .btn-submit:hover { background: #f39c12; }
        .btn-cancel { display: block; text-align: center; margin-top: 15px; color: #e74c3c; text-decoration: none; font-weight: bold; transition: 0.3s;}
        .btn-cancel:hover { color: #c0392b; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Passenger Details</h2>
        <div class="flight-info">Booking for: {{ flight }}</div>

        <form action="/payment" method="POST">
            <input type="hidden" name="flight_name" value="{{ flight }}">

            <div class="grid-form">
                <div><label>First Name</label><input type="text" name="fname" required></div>
                <div><label>Last Name</label><input type="text" name="lname" required></div>
                <div><label>Email</label><input type="email" name="email" required></div>
                <div><label>Mobile No</label><input type="text" name="mobile" required></div>
                <div><label>Passport No</label><input type="text" name="passport" required></div>
                <!-- এখানে min এবং max যোগ করা হয়েছে -->
                <div><label>Date of Birth</label><input type="date" name="dob" min="1970-01-01" max="2026-12-31" required></div>
                <div class="full-width"><label>Address</label><input type="text" name="address" required></div>
                
                <div>
                    <label>Class</label>
                    <select name="p_class" id="class-select" required>
                        <option value="Economy" selected>Economy</option>
                        <option value="Business">Business</option>
                    </select>
                </div>
                <div>
                    <label>Gender</label>
                    <select name="gender" required>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
            </div>

            <div class="seat-selection">
                <h3>Select Your Seats 💺 (Multiple Allowed)</h3>
                
                <div class="legend">
                    <div><span class="leg-box" style="background: #f1c40f;"></span> Business</div>
                    <div><span class="leg-box" style="background: #95a5a6;"></span> Economy</div>
                    <div><span class="leg-box" style="background: #2ecc71;"></span> Selected</div>
                    <div><span class="leg-box" style="background: #e74c3c;"></span> Blocked</div>
                </div>

                <div class="plane-body">
                    
                    <div id="business-section" style="display: none;">
                        <h4 style="color: #1a2a6c; margin-bottom: 15px;">Business Class</h4>
                        <div class="seat-row">
                            <input type="checkbox" id="1A" name="seat" value="1A" class="seat-input" {% if '1A' in booked_seats %} disabled {% endif %}><label for="1A" class="seat-label business">1A</label>
                            <input type="checkbox" id="1B" name="seat" value="1B" class="seat-input" {% if '1B' in booked_seats %} disabled {% endif %}><label for="1B" class="seat-label business">1B</label>
                            <div class="aisle"></div>
                            <input type="checkbox" id="1C" name="seat" value="1C" class="seat-input" {% if '1C' in booked_seats %} disabled {% endif %}><label for="1C" class="seat-label business">1C</label>
                            <input type="checkbox" id="1D" name="seat" value="1D" class="seat-input" {% if '1D' in booked_seats %} disabled {% endif %}><label for="1D" class="seat-label business">1D</label>
                        </div>
                    </div>

                    <div id="economy-section">
                        <h4 style="color: #1a2a6c; margin-bottom: 15px;">Economy Class</h4>
                        <div class="seat-row">
                            <input type="checkbox" id="2A" name="seat" value="2A" class="seat-input" {% if '2A' in booked_seats %} disabled {% endif %}><label for="2A" class="seat-label economy">2A</label>
                            <input type="checkbox" id="2B" name="seat" value="2B" class="seat-input" {% if '2B' in booked_seats %} disabled {% endif %}><label for="2B" class="seat-label economy">2B</label>
                            <div class="aisle"></div>
                            <input type="checkbox" id="2C" name="seat" value="2C" class="seat-input" {% if '2C' in booked_seats %} disabled {% endif %}><label for="2C" class="seat-label economy">2C</label>
                            <input type="checkbox" id="2D" name="seat" value="2D" class="seat-input" {% if '2D' in booked_seats %} disabled {% endif %}><label for="2D" class="seat-label economy">2D</label>
                        </div>
                        <div class="seat-row">
                            <input type="checkbox" id="3A" name="seat" value="3A" class="seat-input" {% if '3A' in booked_seats %} disabled {% endif %}><label for="3A" class="seat-label economy">3A</label>
                            <input type="checkbox" id="3B" name="seat" value="3B" class="seat-input" {% if '3B' in booked_seats %} disabled {% endif %}><label for="3B" class="seat-label economy">3B</label>
                            <div class="aisle"></div>
                            <input type="checkbox" id="3C" name="seat" value="3C" class="seat-input" {% if '3C' in booked_seats %} disabled {% endif %}><label for="3C" class="seat-label economy">3C</label>
                            <input type="checkbox" id="3D" name="seat" value="3D" class="seat-input" {% if '3D' in booked_seats %} disabled {% endif %}><label for="3D" class="seat-label economy">3D</label>
                        </div>
                        <div class="seat-row">
                            <input type="checkbox" id="4A" name="seat" value="4A" class="seat-input" {% if '4A' in booked_seats %} disabled {% endif %}><label for="4A" class="seat-label economy">4A</label>
                            <input type="checkbox" id="4B" name="seat" value="4B" class="seat-input" {% if '4B' in booked_seats %} disabled {% endif %}><label for="4B" class="seat-label economy">4B</label>
                            <div class="aisle"></div>
                            <!-- 4C তে রেডিও এর বদলে চেকবক্স করে দেওয়া হয়েছে -->
                            <input type="checkbox" id="4C" name="seat" value="4C" class="seat-input" {% if '4C' in booked_seats %} disabled {% endif %}><label for="4C" class="seat-label economy">4C</label>
                            <input type="checkbox" id="4D" name="seat" value="4D" class="seat-input" {% if '4D' in booked_seats %} disabled {% endif %}><label for="4D" class="seat-label economy">4D</label>
                        </div>
                    </div>

                </div>
            </div>

            <button type="submit" class="btn-submit">Proceed to Payment</button>
            <a href="/" class="btn-cancel">Cancel Booking</a>
        </form>
    </div>

    <script>
        const classSelect = document.getElementById('class-select');
        const businessSection = document.getElementById('business-section');
        const economySection = document.getElementById('economy-section');
        const allSeats = document.querySelectorAll('.seat-input');

        function toggleSeats() {
            // Class change korle ager select kora seat gulo uncheck kore dibe
            allSeats.forEach(seat => seat.checked = false);

            if (classSelect.value === 'Business') {
                businessSection.style.display = 'block';
                economySection.style.display = 'none';
            } else {
                businessSection.style.display = 'none';
                economySection.style.display = 'block';
            }
        }

        // Dropdown e click korle funtion ta call hobe
        classSelect.addEventListener('change', toggleSeats);
        
        // Page load howar sathe sathe function ta ekbar call hobe
        toggleSeats();
    </script>
</body>
</html>
