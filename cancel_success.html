<!DOCTYPE html>
<html>
<head>
    <title>Cancellation Successful - SkyLink</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: #f4f7f6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .cancel-card { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            width: 400px; 
            text-align: center; 
            border-top: 8px solid #e74c3c; /* লাল বর্ডার */
        }
        .icon-circle {
            background: #ffeaea;
            color: #e74c3c;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            margin: 0 auto 20px auto;
        }
        h2 { color: #2c3e50; margin: 0 0 10px 0; font-size: 24px;}
        p { color: #7f8c8d; font-size: 15px; margin-bottom: 25px; line-height: 1.5;}
        
        .ticket-highlight {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #e74c3c;
            color: #e74c3c;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 25px;
        }
        
        .btn-home { 
            background: #1a2a6c; 
            color: white; 
            text-decoration: none; 
            padding: 12px 25px; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 15px; 
            display: inline-block;
            transition: 0.3s;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-home:hover { background: #f39c12; }
    </style>
</head>
<body>
    <div class="cancel-card">
        <div class="icon-circle">🗑️</div>
        <h2>Cancellation Successful</h2>
        <p>Your flight ticket has been cancelled successfully. Any eligible refund will be processed within 3-5 business days.</p>
        
        <div class="ticket-highlight">
            Ticket ID: {{ ticket_no }}
        </div>
        
        <a href="/" class="btn-home">← Back to Home</a>
    </div>
</body>
</html>
